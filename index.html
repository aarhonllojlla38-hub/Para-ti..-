<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

.mensaje{
    position:absolute;
    color:#ff4d6d;
    font-size:22px;
    font-weight:bold;
    animation:flotar 8s linear infinite;
}

@keyframes flotar{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-100px);
        opacity:1;
    }
}

.corazon{
    position:absolute;
    color:red;
    font-size:30px;
    pointer-events:none;
    animation:subir 2s forwards;
}

@keyframes subir{
    0%{
        transform:translate(-50%,-50%) scale(1);
        opacity:1;
    }
    100%{
        transform:translate(-50%,-200px) scale(2);
        opacity:0;
    }
}

#titulo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#ff4d6d;
    font-size:40px;
    text-shadow:0 0 20px red;
}
</style>
</head>

<body>

<div id="titulo">❤️ TE AMO ❤️</div>

<script>

const mensajes = [
"Te Amo ❤️",
"Eres Mi Todo ❤️",
"Mi Princesa ❤️",
"Por Siempre ❤️",
"Amor Infinito ❤️",
"Mi Felicidad ❤️",
"Siempre Tú ❤️",
"Mi Corazón ❤️"
];

function crearMensaje(){
    const texto = document.createElement("div");
    texto.className = "mensaje";
    texto.innerText =
      mensajes[Math.floor(Math.random()*mensajes.length)];

    texto.style.left = Math.random()*100 + "vw";

    document.body.appendChild(texto);

    setTimeout(()=>{
        texto.remove();
    },8000);
}

setInterval(crearMensaje,1000);

document.addEventListener("click",(e)=>{

    for(let i=0;i<8;i++){

        const corazon = document.createElement("div");
        corazon.className="corazon";
        corazon.innerHTML="❤️";

        corazon.style.left =
          (e.clientX + (Math.random()*80-40))+"px";

        corazon.style.top =
          (e.clientY + (Math.random()*80-40))+"px";

        document.body.appendChild(corazon);

        setTimeout(()=>{
            corazon.remove();
        },2000);
    }
});

</script>

</body>
</html>
